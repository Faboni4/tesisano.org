paths:
  uploads: uploads
  static: ''
collections_config:
  pages:
    path: ''
    glob:
      -
      -
    icon: wysiwyg
    disable_url: false
    _editables:
      text:
        allow_custom_markup: true
        remove_custom_markup: true
        bold: true
        copyformatting: true
        italic: true
        link: true
        paths:
          uploads:
          uploads_filename:
          uploads_use_relative_path:
          static:
          dam_uploads:
          dam_uploads_filename:
          dam_static:
        redo: true
        removeformat: true
        strike:
        subscript:
        superscript:
        underline:
        undo: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
editor:
  default_path:
timezone: Africa/Cairo
markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: false
    code_block_fences: '```'
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    attributes: false
